name: First Workflow

on: [push]
jobs:
    run-shell-commands:
        runs-on: ubuntu-latest
        steps:
            - name: echo a string
              run: echo "Hello World"
            - name: Multi-line string
              run: |
                  node -v 
                  npm -v

    parallel-jobs-macos:
        runs-on: macos-latest
        steps:
            - name: View SW Version
              run: sw_vers
    depedent-jobs:
        runs-on: windows-latest
        needs: run-shell-commands
        steps:
            - name: echo a string
              run: Write-Output "Hello World"
            - name: Error step
              run: doesnotexixt

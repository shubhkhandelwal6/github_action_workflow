name: Status check yaml
on:[push]

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
            - name: Step 1
              run : sleep 20
            - name: Run on failure 
              if: failure()
              run: echo 'Runs on failure'
            - name: Run on success 
              if: success()
              run: echo 'Runs on success'
            - name: Run on cancelled
              if: cancelled()
              run: echo 'Runs on cancelled'
            - name: Run if always run
              if: always()
              run: echo 'Alwyas runs'
              
    job-2:
        runs-on: ubuntu-latest
        needs: job-1
        if: failure()
        steps:
            - name : Run
              run: echo 'Job 2'